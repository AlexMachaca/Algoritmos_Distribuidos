<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Distribuidos - Algoritmos de Elección</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div class="p-6">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">Simulador de Algoritmos de Elección</h1>
        
        <div class="flex flex-col items-center gap-6 mb-10">
            <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-600">
                <button id="btn-bully" onclick="cambiarModo('BULLY')" class="px-6 py-2 rounded-md font-bold transition-all bg-blue-600 text-white">Algoritmo BULLY</button>
                <button id="btn-ring" onclick="cambiarModo('RING')" class="px-6 py-2 rounded-md font-bold transition-all text-slate-400 hover:text-white">Algoritmo RING (Anillo)</button>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <label for="speed-slider" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Velocidad de Simulación</label>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-slate-500">Rápido</span>
                    <input type="range" id="speed-slider" min="200" max="2000" value="800" step="100" 
                        class="w-48 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <span class="text-xs text-slate-500">Lento</span>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="agregarNodo()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg font-bold shadow-lg transition-all">Añadir Nodo</button>
                <button onclick="iniciarEleccion()" class="bg-amber-600 hover:bg-amber-700 px-5 py-2 rounded-lg font-bold shadow-lg transition-all">Iniciar Elección</button>
                <button onclick="resetCompleto()" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-lg font-bold shadow-lg transition-all">Reiniciar Todo</button>
                <button onclick="revivirNodos()" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg font-bold shadow-lg transition-all">Revivir Todos</button>
            </div>
        </div>

        <div class="relative w-full flex justify-center items-center h-[550px]">
            <div id="red-distribuida" class="relative w-[500px] h-[500px] border-2 border-slate-800 rounded-full flex items-center justify-center">
                <!-- Capa para las líneas de conexión -->
                <svg id="svg-conexiones" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;"></svg>
            </div>

            <div id="leyenda" class="absolute right-10 top-0 bg-slate-800/90 p-4 rounded-xl border border-slate-600 w-56 shadow-2xl">
                <h3 id="leyenda-titulo" class="text-blue-400 font-bold mb-3 border-b border-slate-700 pb-1 italic">Leyenda Bully</h3>
                <div id="leyenda-contenido" class="space-y-4 text-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#f59e0b]"></div> 
                        <span>ELECTION (Elección)</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#10b981]"></div> 
                        <span>OK (Respuesta)</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#8b5cf6]"></div> 
                        <span>COORDINATOR (Líder)</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="consola" class="fixed bottom-0 left-0 w-full p-4 bg-black/80 h-32 overflow-y-auto border-t border-slate-700 font-mono text-xs text-green-400 shadow-2xl">
            <p class="text-gray-500">> Sistema listo. Selecciona algoritmo y añade nodos.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
